<!DOCTYPE html>
<html>
<head>
    <title>Parents Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Parents Login 🔐</h1>
</header>

<div class="container">
    <div class="card" style="max-width:400px;margin:auto;">
        <h2>Login</h2>
        <form onsubmit="return Parentlogin()">
            <input type="text" id="rollno" placeholder="Students Roll No" style="width:100%;padding:10px;margin:10px 0;">
            <input type="text" id="mobile" placeholder="Parents Mobile No" style="width:100%;padding:10px;margin:10px 0;">
            <button type="submit">Login</button>
        </form>
    </div>
</div>

<script src="parents.js"></script>
</body>
</html>
